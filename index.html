<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>シューティング</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #F5F7FA;
            touch-action: none;
            /* スマホでのスクロール防止 */
        }

        /* ネオブルータリズムのカスタムクラス */
        .neo-border {
            border: 4px solid #0B2F52;
        }

        .neo-shadow {
            box-shadow: 8px 8px 0px #0B2F52;
            transition: all 0.1s ease;
        }

        .neo-shadow-sm {
            box-shadow: 4px 4px 0px #0B2F52;
        }

        .neo-text-shadow {
            text-shadow: 4px 4px 0px #0B2F52;
        }

        .neo-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 2px 2px 0px #0B2F52;
        }

        /* カラー変数 */
        :root {
            --azure: #0095FF;
            --navy: #0B2F52;
            --cloud: #F5F7FA;
            --accent: #FF5A5F;
            --heal: #00E676;
            --power: #FFD700;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            background-image: url('bg.png');
            background-size: cover;
            background-position: 0 0;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            /* クリックをCanvasに貫通させる */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- UI レイヤー -->
        <div id="ui-layer">

            <!-- HUD (ゲーム中) -->
            <div id="hud"
                class="hidden w-full max-w-2xl mx-auto p-2 flex flex-col justify-start items-stretch gap-1">
                <div class="flex gap-2 justify-between items-center w-full">
                    <div class="flex gap-1 sm:gap-2 items-center">
                        <button id="pauseBtn"
                            class="pointer-events-auto bg-[#F5F7FA] text-[#0B2F52] font-black px-2 sm:px-4 py-1 neo-border neo-shadow-sm neo-btn text-[10px] sm:text-sm hover:bg-gray-200 shrink-0">HOME</button>
                        <div
                            class="bg-[#F5F7FA] neo-border neo-shadow-sm p-1 flex flex-col w-10 sm:w-16 items-center">
                            <span
                                class="text-[#0B2F52] text-[8px] sm:text-[10px] font-black uppercase tracking-wider leading-tight">ST</span>
                            <span id="stageDisplay"
                                class="text-[#FF5A5F] text-xs sm:text-lg font-black leading-none">1</span>
                        </div>
                        <div class="bg-[#F5F7FA] neo-border neo-shadow-sm p-1 flex flex-col w-20 sm:w-28">
                            <span
                                class="text-[#0B2F52] text-[8px] sm:text-[10px] font-black uppercase tracking-wider leading-tight">SCORE</span>
                            <span id="scoreDisplay"
                                class="text-[#0095FF] text-xs sm:text-lg font-black leading-none truncate">0</span>
                        </div>
                    </div>

                    <!-- プレイヤーHP (上部にコンパクトに配置) -->
                    <div class="flex-1 max-w-[120px] sm:max-w-[200px] bg-[#F5F7FA] neo-border neo-shadow-sm p-0.5 flex items-center h-5 sm:h-7">
                        <div
                            class="bg-[#0B2F52] text-[#F5F7FA] text-[8px] sm:text-[10px] font-black px-1 mr-0.5 h-full flex items-center">
                            HP</div>
                        <div class="flex-1 h-full bg-gray-200 relative neo-border border-2 overflow-hidden">
                            <div id="hpBar"
                                class="absolute top-0 left-0 h-full bg-[#0095FF] transition-all duration-200"
                                style="width: 100%;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- タイトル画面 -->
            <div id="startScreen"
                class="absolute inset-0 flex flex-col items-center justify-center pointer-events-auto bg-[#F5F7FA] bg-opacity-90 p-4">
                <h1
                    class="text-4xl sm:text-6xl md:text-8xl font-black text-[#F5F7FA] neo-text-shadow tracking-tighter mb-4 sm:mb-8 transform -rotate-2 text-center">
                    NEW<br><span class="text-[#0095FF]">SHOOTER</span>
                </h1>

                <div class="bg-white neo-border neo-shadow p-3 sm:p-6 mb-4 sm:mb-8 max-w-sm text-center transform rotate-1">
                    <h2 class="text-[#0B2F52] font-black text-base sm:text-xl mb-1 sm:mb-2 border-b-4 border-[#0B2F52] pb-1 sm:pb-2">HOW TO PLAY</h2>
                    <ul class="text-[#0B2F52] text-[10px] sm:text-sm text-left font-bold space-y-1 sm:space-y-2 mt-2 sm:mt-4">
                        <li>⌨️ 【PC】WASD / 方向キーで移動</li>
                        <li>📱 【スマホ】スワイプで移動</li>
                        <li class="text-[#FF5A5F] font-black">🚀 スペース長押し / 2本指でチャージ</li>
                        <li>🔫 ショットは自動発射</li>
                        <li>💊 <span class="text-[#00E676]">緑</span>: HP回復 / ⚡ <span class="text-[#FFD700]">黄</span>: 強化</li>
                        <li>🛡️ <span class="text-[#00FFFF]">青</span>: シールド / 🤖 <span class="text-[#FF00FF]">紫</span>: ドローン</li>
                    </ul>
                </div>

                <div class="grid grid-cols-3 gap-2 sm:flex sm:gap-4">
                    <button
                        class="stage-btn pointer-events-auto bg-[#0095FF] text-[#F5F7FA] text-xs sm:text-xl font-black px-2 sm:px-8 py-2 sm:py-4 neo-border neo-shadow neo-btn uppercase tracking-tighter sm:tracking-widest"
                        data-stage="1">
                        St. 1
                    </button>
                    <button
                        class="stage-btn pointer-events-auto bg-[#FFD700] text-[#0B2F52] text-xs sm:text-xl font-black px-2 sm:px-8 py-2 sm:py-4 neo-border neo-shadow neo-btn uppercase tracking-tighter sm:tracking-widest"
                        data-stage="2">
                        St. 2
                    </button>
                    <button
                        class="stage-btn pointer-events-auto bg-[#FF5A5F] text-[#F5F7FA] text-xs sm:text-xl font-black px-2 sm:px-8 py-2 sm:py-4 neo-border neo-shadow neo-btn uppercase tracking-tighter sm:tracking-widest"
                        data-stage="3">
                        St. 3
                    </button>
                </div>
            </div>

            <!-- ゲームオーバー画面 -->
            <div id="gameOverScreen"
                class="hidden absolute inset-0 flex flex-col items-center justify-center pointer-events-auto bg-[#0B2F52] bg-opacity-80 backdrop-blur-sm z-40 p-4">
                <div class="bg-[#F5F7FA] neo-border neo-shadow p-6 sm:p-8 flex flex-col items-center transform -rotate-1 w-full max-w-xs sm:max-w-md">
                    <h2 class="text-3xl sm:text-5xl font-black text-[#FF5A5F] mb-2">GAME OVER</h2>
                    <p class="text-[#0B2F52] font-black text-lg sm:text-xl mb-6">SCORE: <span id="finalScore"
                            class="text-[#0095FF] text-2xl sm:text-3xl">0</span></p>
                    <button id="retryBtn"
                        class="bg-[#0095FF] text-[#F5F7FA] text-xl sm:text-2xl font-black px-8 py-2 sm:py-3 neo-border neo-shadow neo-btn uppercase">
                        Retry
                    </button>
                </div>
            </div>

            <!-- ゲームクリア画面 -->
            <div id="gameClearScreen"
                class="hidden absolute inset-0 flex flex-col items-center justify-center pointer-events-auto bg-black bg-opacity-70 backdrop-blur-md z-40 p-4">
                <div
                    class="bg-[#F5F7FA] neo-border neo-shadow p-6 sm:p-12 flex flex-col items-center transform rotate-2 animate-bounce w-full max-w-sm sm:max-w-2xl">
                    <h2 class="text-4xl sm:text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#FFD700] via-[#FF5A5F] to-[#00FFFF] mb-4 text-center"
                        style="-webkit-background-clip: text; background-clip: text;">GAME CLEAR!!</h2>
                    <p class="text-[#0B2F52] font-black text-xl sm:text-3xl mb-8">SCORE: <span id="clearScore"
                            class="text-[#FF00FF] text-3xl sm:text-5xl">0</span></p>
                    <button id="homeBtnClear"
                        class="bg-[#FFD700] text-[#0B2F52] text-xl sm:text-2xl font-black px-8 py-3 sm:px-12 sm:py-4 neo-border neo-shadow neo-btn uppercase transition-transform hover:scale-110">
                        Home
                    </button>
                </div>
            </div>

            <!-- ポーズ/ホーム確認モーダル -->
            <div id="pauseModal"
                class="hidden absolute inset-0 flex flex-col items-center justify-center pointer-events-auto bg-[#0B2F52] bg-opacity-80 backdrop-blur-sm z-50 p-4">
                <div
                    class="bg-[#F5F7FA] neo-border neo-shadow p-6 sm:p-8 flex flex-col items-center transform rotate-1 text-center w-full max-w-xs sm:max-w-md">
                    <h2 class="text-2xl sm:text-3xl font-black text-[#0B2F52] mb-2">タイトルに戻りますか？</h2>
                    <p class="text-[#0B2F52] font-bold mb-8 text-sm sm:text-base">現在の進行状況は失われます。</p>
                    <div class="flex gap-4 justify-center">
                        <button id="resumeBtn"
                            class="bg-[#F5F7FA] text-[#0B2F52] text-lg sm:text-xl font-black px-6 sm:px-8 py-2 sm:py-3 neo-border neo-shadow-sm neo-btn hover:bg-gray-200">NO</button>
                        <button id="goHomeBtn"
                            class="bg-[#FF5A5F] text-[#F5F7FA] text-lg sm:text-xl font-black px-6 sm:px-8 py-2 sm:py-3 neo-border neo-shadow-sm neo-btn">YES</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        /** --- エンジン設定と定数 --- */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const gameClearScreen = document.getElementById('gameClearScreen');
        const clearScore = document.getElementById('clearScore');
        const homeBtnClear = document.getElementById('homeBtnClear');
        const hud = document.getElementById('hud');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const hpBar = document.getElementById('hpBar');
        const stageBtns = document.querySelectorAll('.stage-btn');
        const retryBtn = document.getElementById('retryBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const pauseModal = document.getElementById('pauseModal');
        const resumeBtn = document.getElementById('resumeBtn');
        const goHomeBtn = document.getElementById('goHomeBtn');

        // Colors (ネオブルータリズム指定)
        const COLORS = {
            primary: '#0095FF',
            navy: '#0B2F52',
            cloud: '#F5F7FA',
            accent: '#FF5A5F',
            heal: '#00E676',
            power: '#FFD700',
            line: '#0B2F52',
            enemy: '#E2F1FF' // 明るい白っぽい色 (背景とのコントラスト確保用)
        };

        /** --- サウンドエフェクトジェネレータ (Web Audio API) --- */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            switch (type) {
                case 'shoot':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                    gain.gain.setValueAtTime(0.02, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'hit':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'explosion':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.exponentialRampToValueAtTime(10, now + 0.3);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'powerup':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.linearRampToValueAtTime(880, now + 0.1);
                    osc.frequency.linearRampToValueAtTime(1320, now + 0.2);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'siren':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                    osc.frequency.linearRampToValueAtTime(400, now + 1.0);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.linearRampToValueAtTime(0, now + 1.0);
                    osc.start(now);
                    osc.stop(now + 1.0);
                    break;
                case 'laser':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'bomb':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.exponentialRampToValueAtTime(10, now + 1.0);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                    osc.start(now);
                    osc.stop(now + 1.0);
                    break;
            }
        }

        let GAME_WIDTH = window.innerWidth;
        let GAME_HEIGHT = window.innerHeight;
        let scaleFactor = 1.0;

        // ゲーム状態
        let gameState = 'start'; // start, playing, paused, gameover
        let score = 0;
        let frameCount = 0;
        let lastTime = 0;

        // ゲームデータ
        let player;
        let bullets = [];
        let enemies = [];
        let particles = [];
        let items = [];
        let activeBoss = null;

        // 進行管理
        let mobsKilled = 0;
        let bossPhase = 1;
        let difficultyLevel = 1;
        let currentStage = 1;

        // 演出状態
        let shakeTime = 0;
        let shakeMagnitude = 0;
        let hitStopTime = 0;
        let hitStopCallback = null;
        let warningTimer = 0;
        let nextBossType = null;
        let stageClearTimer = 0;
        let stageStartTimer = 0;
        let isGameClear = false;
        let gameClearTimer = 0;

        /** --- 画像アセットの読み込み --- */
        const images = {};
        function loadImage(name, src) {
            images[name] = new Image();
            images[name].src = src;
        }
        loadImage('small_boss', 'small_boss.png');
        loadImage('medium_boss', 'medium_boss.png');
        loadImage('large_boss', 'large_boss.png');
        loadImage('player_ship', 'player_ship.png');
        loadImage('mob_enemy', 'mob_enemy.png');
        loadImage('mob_enemy_2', 'mob_enemy_2.png');
        loadImage('mob_enemy_3', 'mob_enemy_3.png');

        // 入力 (キーボード)
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, ' ': false };

        /** --- リサイズ処理 --- */
        function resizeCanvas() {
            GAME_WIDTH = window.innerWidth;
            GAME_HEIGHT = window.innerHeight;
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
            // 横幅を基準にスケールを決定 (基準: 800px)
            scaleFactor = Math.min(1.2, Math.max(0.6, GAME_WIDTH / 800));
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        /** --- 入力イベント --- */
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        /** --- タッチイベント (スマホ対応) --- */
        let lastTouchX = null;
        let lastTouchY = null;

        // キャンバス上でスクロールが発生しないようにする
        canvas.addEventListener('touchstart', (e) => {
            if (gameState !== 'playing') return;
            e.preventDefault();
            if (e.touches.length > 0) {
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            }
            keys[' '] = (e.touches.length >= 2);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (gameState !== 'playing') return;
            e.preventDefault();
            if (e.touches.length > 0 && lastTouchX !== null) {
                const touchX = e.touches[0].clientX;
                const touchY = e.touches[0].clientY;

                if (player) {
                    // 相対座標（スワイプ量）を直接座標に加算（1:1トラッキング）
                    // 感度を微調整
                    const sensitivity = 1.2;
                    player.x += (touchX - lastTouchX) * sensitivity;
                    player.y += (touchY - lastTouchY) * sensitivity;
                    // 画面外に出ないようにクランプ
                    player.x = Math.max(player.size, Math.min(GAME_WIDTH - player.size, player.x));
                    player.y = Math.max(player.size, Math.min(GAME_HEIGHT - player.size, player.y));
                }

                lastTouchX = touchX;
                lastTouchY = touchY;
            }
            keys[' '] = (e.touches.length >= 2);
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (gameState !== 'playing') return;
            e.preventDefault();
            if (e.touches.length === 0) {
                lastTouchX = null;
                lastTouchY = null;
            } else if (e.touches.length > 0) {
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            }
            keys[' '] = (e.touches.length >= 2);
        }, { passive: false });

        let bgScroll = 0;

        /** --- 描画ヘルパー（ネオブルータリズム風） --- */
        function drawRectNeo(ctx, x, y, w, h, fillCol, strokeCol = COLORS.line, lw = 4) {
            ctx.fillStyle = fillCol;
            ctx.fillRect(x, y, w, h);
            ctx.lineWidth = lw * scaleFactor;
            ctx.strokeStyle = strokeCol;
            ctx.strokeRect(x, y, w, h);
        }

        function drawCircleNeo(ctx, x, y, r, fillCol, strokeCol = COLORS.line, lw = 4) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = fillCol;
            ctx.fill();
            ctx.lineWidth = lw * scaleFactor;
            ctx.strokeStyle = strokeCol;
            ctx.stroke();
        }

        function drawTriangleNeo(ctx, x, y, size, fillCol, angle = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.beginPath();
            ctx.moveTo(0, -size);
            ctx.lineTo(size * 0.866, size * 0.5);
            ctx.lineTo(-size * 0.866, size * 0.5);
            ctx.closePath();
            ctx.fillStyle = fillCol;
            ctx.fill();
            ctx.lineWidth = 4 * scaleFactor;
            ctx.strokeStyle = COLORS.line;
            ctx.stroke();
            ctx.restore();
        }

        /** --- クラス定義 --- */
        class Player {
            constructor() {
                this.size = 18 * scaleFactor;
                this.x = GAME_WIDTH / 2;
                this.y = GAME_HEIGHT * 0.8;
                this.hp = 100;
                this.maxHp = 100;
                this.speed = 800; // ピクセル/秒 (さらに高速化)
                this.fireTimer = 0;
                this.powerLevel = 1;
                this.shieldActive = false;
                this.droneCount = 0;
                this.isCharging = false;
                this.chargeLevel = 0;
                this.laserModeTimer = 0;
            }

            update(dt) {
                if (this.laserModeTimer > 0) this.laserModeTimer -= dt;
                // キーボード移動
                let dx = 0, dy = 0;
                if (keys.w || keys.ArrowUp) dy -= 1;
                if (keys.s || keys.ArrowDown) dy += 1;
                if (keys.a || keys.ArrowLeft) dx -= 1;
                if (keys.d || keys.ArrowRight) dx += 1;

                if (dx !== 0 && dy !== 0) {
                    const len = Math.sqrt(dx * dx + dy * dy);
                    dx /= len; dy /= len;
                }

                this.x += dx * this.speed * (dt / 1000) * scaleFactor;
                this.y += dy * this.speed * (dt / 1000) * scaleFactor;

                // 画面端の制限
                this.x = Math.max(this.size, Math.min(GAME_WIDTH - this.size, this.x));
                this.y = Math.max(this.size, Math.min(GAME_HEIGHT - this.size, this.y));

                // チャージロジック
                if (keys[' ']) {
                    this.isCharging = true;
                    this.chargeLevel = Math.min(100, this.chargeLevel + dt * 0.1);
                    if (this.chargeLevel > 30 && Math.random() < 0.3) {
                        createParticles(this.x + (Math.random() - 0.5) * 30 * scaleFactor, this.y + (Math.random() - 0.5) * 30 * scaleFactor, '#00FFFF', 1);
                    }
                } else {
                    if (this.isCharging && this.chargeLevel >= 50) {
                        this.fireChargeShot();
                    }
                    this.isCharging = false;
                    this.chargeLevel = 0;
                }

                // 自動射撃（チャージ中は撃たない）
                if (!this.isCharging) {
                    this.fireTimer += dt;
                    const fireRate = Math.max(30, 200 - (this.powerLevel * 12));

                    if (this.fireTimer > fireRate) {
                        this.shoot();
                        this.fireTimer = 0;
                    }
                }
            }

            fireChargeShot() {
                playSound('explosion');
                const scale = this.chargeLevel / 100;
                bullets.push(new Bullet(this.x, this.y - this.size * 2, 0, -20 * scaleFactor, false, true, scale));
                createParticles(this.x, this.y, '#00FFFF', 30);
                shakeTime = 150; shakeMagnitude = 8;
            }

            shoot() {
                if (this.laserModeTimer > 0) {
                    playSound('laser');
                    bullets.push(new Bullet(this.x, this.y - this.size * 3, 0, -30 * scaleFactor, false, true, 0.5));
                    return;
                }

                const maxBullets = Math.min(this.powerLevel, 15); // 最大15発
                const baseSpeed = 15 * scaleFactor;

                // 前方への弾
                const forwardBullets = Math.min(maxBullets, 9);
                const angleStep = 0.12;
                const startAngle = -Math.PI / 2 - (angleStep * (forwardBullets - 1)) / 2;

                for (let i = 0; i < forwardBullets; i++) {
                    const angle = startAngle + angleStep * i;
                    const vx = Math.cos(angle) * baseSpeed;
                    const vy = Math.sin(angle) * baseSpeed;
                    const offsetX = Math.cos(angle) * 15 * scaleFactor;
                    const offsetY = Math.sin(angle) * 15 * scaleFactor - this.size;
                    bullets.push(new Bullet(this.x + offsetX, this.y + offsetY, vx, vy, false));
                }

                // パワーレベルが高い場合は後方や側面にも発射
                if (maxBullets > 9) {
                    const extra = maxBullets - 9; // 最大6発まで
                    const backStartAngle = Math.PI / 2 - (0.2 * (extra - 1)) / 2;
                    for (let i = 0; i < extra; i++) {
                        const angle = backStartAngle + 0.2 * i;
                        const vx = Math.cos(angle) * baseSpeed * 0.8;
                        const vy = Math.sin(angle) * baseSpeed * 0.8;
                        bullets.push(new Bullet(this.x, this.y + this.size, vx, vy, false));
                    }
                }

                // ドローンの攻撃
                for (let i = 0; i < this.droneCount; i++) {
                    const angle = (frameCount * 0.05) + (Math.PI * 2 * i / this.droneCount);
                    const dx = Math.cos(angle) * 40 * scaleFactor;
                    const dy = Math.sin(angle) * 40 * scaleFactor;
                    bullets.push(new Bullet(this.x + dx, this.y + dy, 0, -baseSpeed, false));
                }
                playSound('shoot');
            }

            draw(ctx) {
                // チャージ中のオーラ
                if (this.isCharging && this.chargeLevel > 0) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size + this.chargeLevel * 0.4 * scaleFactor, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 255, 255, ${this.chargeLevel / 300})`;
                    ctx.fill();
                }

                // 自機グラフィック
                if (images['player_ship'] && images['player_ship'].complete) {
                    // 画像を描画
                    ctx.drawImage(images['player_ship'], this.x - this.size * 1.5, this.y - this.size * 1.5, this.size * 3, this.size * 3);
                } else {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = COLORS.primary;
                    drawCircleNeo(ctx, this.x, this.y, this.size, COLORS.primary);
                    drawRectNeo(ctx, this.x - 6 * scaleFactor, this.y - 6 * scaleFactor, 12 * scaleFactor, 12 * scaleFactor, COLORS.cloud, COLORS.line, 2);
                    ctx.shadowBlur = 0;
                }

                // ドローンの描画
                for (let i = 0; i < this.droneCount; i++) {
                    const angle = (frameCount * 0.05) + (Math.PI * 2 * i / this.droneCount);
                    const dx = Math.cos(angle) * 40 * scaleFactor;
                    const dy = Math.sin(angle) * 40 * scaleFactor;

                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#FF00FF';
                    drawCircleNeo(ctx, this.x + dx, this.y + dy, 8 * scaleFactor, '#FF00FF');
                    ctx.shadowBlur = 0;
                }

                // シールドエフェクト
                if (this.shieldActive) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size + 10 * scaleFactor, 0, Math.PI * 2);
                    ctx.strokeStyle = '#00FFFF';
                    ctx.lineWidth = 3 * scaleFactor;
                    ctx.stroke();

                    ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
                    ctx.fill();
                }
            }

            takeDamage(amount) {
                if (this.shieldActive) {
                    this.shieldActive = false; // シールド消費でダメージ無効
                    createParticles(this.x, this.y, '#00FFFF', 20);
                    playSound('hit');
                    shakeTime = 150; shakeMagnitude = 5;
                    return;
                }
                this.hp -= amount;
                createParticles(this.x, this.y, COLORS.accent, 10);
                updateHUD();
                shakeTime = 200; shakeMagnitude = 10;

                if (this.hp <= 0) {
                    playSound('explosion');
                    endGame();
                } else {
                    playSound('hit');
                }
            }
        }

        class Bullet {
            constructor(x, y, vx, vy, isEnemy, isCharge = false, scale = 1, color = null) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.isEnemy = isEnemy;
                this.isCharge = isCharge;
                if (this.isCharge) {
                    this.size = (20 + 30 * scale) * scaleFactor;
                    this.color = '#00FFFF';
                    this.damage = Math.floor(10 + 40 * scale);
                } else {
                    this.size = (isEnemy ? 8 : 6) * scaleFactor;
                    // 色の多様化: 引数で指定がない場合はデフォルト
                    if (isEnemy) {
                        this.color = color || COLORS.accent; // 赤が基本
                    } else {
                        this.color = COLORS.primary;
                    }
                    this.damage = 1;
                }
                this.markedForDeletion = false;
            }

            update(dt) {
                this.x += this.vx;
                this.y += this.vy;
                if (this.y < -50 || this.y > GAME_HEIGHT + 50 || this.x < -50 || this.x > GAME_WIDTH + 50) {
                    this.markedForDeletion = true;
                }
            }

            draw(ctx) {
                if (this.isCharge) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                    drawCircleNeo(ctx, this.x, this.y, this.size / 2, this.color);
                    ctx.shadowBlur = 0;
                } else {
                    // 弾の形状にバリエーションを持たせる
                    if (this.isEnemy && this.color !== COLORS.accent) {
                        drawCircleNeo(ctx, this.x, this.y, this.size / 2, this.color, COLORS.line, 2);
                    } else {
                        drawRectNeo(ctx, this.x - this.size / 2, this.y - this.size / 2, this.size, this.size * 2, this.color, COLORS.line, 2);
                    }
                }
            }
        }

        class Enemy {
            constructor(x, y, type = 'mob') {
                this.x = x;
                this.y = y;
                this.type = type;
                this.markedForDeletion = false;
                this.timer = 0;

                if (type.startsWith('mob')) {
                    this.size = 18 * scaleFactor;
                    this.hp = 2 + difficultyLevel;
                    this.vx = (Math.random() - 0.5) * 2 * scaleFactor;
                    // 速度を完全に固定（面白さを損なわない一定の速さ）
                    this.vy = 2.5 * scaleFactor;
                    this.color = COLORS.enemy;
                } else if (type.includes('boss')) {
                    this.targetY = 100 * scaleFactor;
                    this.color = COLORS.accent;
                    activeBoss = this;

                    if (type === 'small_boss') {
                        this.size = 35 * scaleFactor;
                        this.hp = 150 * difficultyLevel;
                        this.vx = 1.8 * scaleFactor; 
                        this.vy = 0;
                    } else if (type === 'medium_boss') {
                        this.size = 55 * scaleFactor;
                        this.hp = 300 * difficultyLevel;
                        this.vx = 2.0 * scaleFactor; 
                        this.vy = 0;
                    } else if (type === 'large_boss') {
                        this.size = 80 * scaleFactor;
                        this.hp = 600 * difficultyLevel;
                        this.vx = 1.0 * scaleFactor; 
                        this.vy = 0;
                    }
                    this.maxHp = this.hp;
                }
            }

            update(dt) {
                this.timer += dt;

                if (this.type.startsWith('mob')) {
                    this.x += this.vx;
                    this.y += this.vy;

                    if (this.x < this.size || this.x > GAME_WIDTH - this.size) this.vx *= -1;

                    // 射撃頻度を抑え、色を混ぜる
                    if (Math.random() < 0.006 * Math.min(difficultyLevel, 4)) {
                        const bulletColor = Math.random() < 0.2 ? '#FF00FF' : COLORS.accent; // たまに紫
                        if (difficultyLevel > 2 && Math.random() < 0.2) {
                            // 3方向弾の頻度を下げ、密度を抑える
                            for(let i = -1; i <= 1; i++) {
                                bullets.push(new Bullet(this.x, this.y + this.size, i * 1.2 * scaleFactor, 4.5 * scaleFactor, true, false, 1, bulletColor));
                            }
                        } else {
                            bullets.push(new Bullet(this.x, this.y + this.size, 0, 5 * scaleFactor, true, false, 1, bulletColor));
                        }
                    }

                    if (this.y > GAME_HEIGHT + 50) this.markedForDeletion = true;

                } else if (this.type.includes('boss')) {
                    if (this.y < this.targetY) {
                        this.y += 1 * scaleFactor;
                    } else {
                        this.x += this.vx;
                        if (this.x < this.size || this.x > GAME_WIDTH - this.size) this.vx *= -1;

                        // ボスの攻撃パターン (上限を設けて画面を埋め尽くさないようにする)
                        const bulletCountBonus = Math.min(2, Math.floor(difficultyLevel / 3));

                        if (this.type === 'small_boss' && this.timer > 1200) {
                            this.timer = 0;
                            const spread = 2 + bulletCountBonus;
                            const color = Math.random() < 0.3 ? '#FFD700' : COLORS.accent; // 黄色を混ぜる
                            for (let i = -spread; i <= spread; i++) {
                                bullets.push(new Bullet(this.x, this.y + this.size, i * 1.1 * scaleFactor, 5.5 * scaleFactor, true, false, 1, color));
                            }
                        } else if (this.type === 'medium_boss' && this.timer > 1000) {
                            this.timer = 0;
                            const spread = 2 + bulletCountBonus;
                            const color = Math.random() < 0.3 ? '#FF00FF' : COLORS.accent; // 紫を混ぜる
                            for (let i = -spread; i <= spread; i++) {
                                bullets.push(new Bullet(this.x, this.y + this.size, i * 1.4 * scaleFactor, 6.5 * scaleFactor, true, false, 1, color));
                            }
                        } else if (this.type === 'large_boss') {
                            if (this.timer > 800) {
                                this.timer = 0;
                                const spread = 3 + bulletCountBonus;
                                const color = Math.random() < 0.4 ? (Math.random() > 0.5 ? '#FFD700' : '#FF00FF') : COLORS.accent;
                                for (let i = -spread; i <= spread; i++) {
                                    bullets.push(new Bullet(this.x, this.y + this.size, i * 1.2 * scaleFactor, 7 * scaleFactor, true, false, 1, color));
                                }
                                // ランダム弾は控えめに
                                if (Math.random() < 0.5) {
                                    bullets.push(new Bullet(this.x + (Math.random() - 0.5) * 100 * scaleFactor, this.y + this.size, (Math.random() - 0.5) * 4 * scaleFactor, 7 * scaleFactor, true, false, 1, '#00FFFF'));
                                }
                            }
                        }
                    }
                }
            }

            draw(ctx) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.PI);

                let imgKey = this.type.startsWith('mob') ? (this.type === 'mob' ? 'mob_enemy' : 'mob_enemy_' + this.type.split('_')[1]) : this.type;
                let drawSize = this.type.startsWith('mob') ? this.size * 3 : this.size * 2;

                if (images[imgKey] && images[imgKey].complete) {
                    ctx.drawImage(images[imgKey], -drawSize / 2, -drawSize / 2, drawSize, drawSize);
                } else {
                    // フォールバック
                    if (this.type.startsWith('mob')) {
                        drawCircleNeo(ctx, 0, 0, this.size, this.color);
                    } else {
                        drawRectNeo(ctx, -this.size, -this.size, this.size * 2, this.size * 2, this.color, COLORS.line, 6);
                    }
                }
                ctx.restore();

                // ボスの場合、HPゲージを下に表示
                if (this.type.includes('boss')) {
                    const barWidth = this.size * 2;
                    const barHeight = 6 * scaleFactor;
                    const offsetX = -barWidth / 2;
                    const offsetY = this.size + 10 * scaleFactor;
                    
                    // 背景
                    drawRectNeo(ctx, this.x + offsetX, this.y + offsetY, barWidth, barHeight, '#F5F7FA', COLORS.line, 2);
                    // ゲージ
                    const hpPercent = Math.max(0, this.hp / this.maxHp);
                    ctx.fillStyle = COLORS.accent;
                    ctx.fillRect(this.x + offsetX + 2 * scaleFactor, this.y + offsetY + 2 * scaleFactor, (barWidth - 4 * scaleFactor) * hpPercent, barHeight - 4 * scaleFactor);
                }

                ctx.shadowBlur = 0;
            }

            takeDamage(amount) {
                this.hp -= amount;
                createParticles(this.x, this.y, COLORS.accent, 3);

                if (this.hp <= 0) {
                    this.die();
                } else {
                    playSound('hit');
                }
            }

            die() {
                this.markedForDeletion = true;

                if (this.type.includes('boss')) {
                    hitStopTime = 200;
                    shakeTime = 500;
                    shakeMagnitude = 15;
                    hitStopCallback = () => {
                        createParticles(this.x, this.y, this.color, 50);
                        playSound('explosion');
                        score += 5000 * difficultyLevel;
                        activeBoss = null;

                        if (this.type === 'small_boss') { bossPhase = 2; mobsKilled = 0; }
                        else if (this.type === 'medium_boss') { bossPhase = 3; mobsKilled = 0; }
                        else if (this.type === 'large_boss') {
                            if (currentStage >= 3) {
                                isGameClear = true;
                                gameClearTimer = 5000;
                                player.shieldActive = true;
                                bullets.forEach(b => { if (b.isEnemy) b.markedForDeletion = true; });
                            } else {
                                bossPhase = 1;
                                difficultyLevel++;
                                mobsKilled = 0;
                                stageClearTimer = 3000;
                                player.hp = player.maxHp;
                                createParticles(player.x, player.y, COLORS.heal, 30);
                            }
                        }

                        items.push(new Item(this.x - 30 * scaleFactor, this.y, 'power'));
                        items.push(new Item(this.x + 30 * scaleFactor, this.y, 'heal'));
                        items.push(new Item(this.x, this.y - 30 * scaleFactor, 'shield'));
                        items.push(new Item(this.x, this.y + 30 * scaleFactor, 'drone'));
                    };
                } else {
                    createParticles(this.x, this.y, this.color, 15);
                    playSound('explosion');
                    score += 100;
                    mobsKilled++;

                    if (Math.random() < 0.1) {
                        const r = Math.random();
                        let itemType = 'power';
                        if (r < 0.2) itemType = 'heal';
                        else if (r < 0.3) itemType = 'shield';
                        else if (r < 0.4) itemType = 'drone';
                        else if (r < 0.5) itemType = 'bomb';
                        else if (r < 0.6) itemType = 'laser';
                        items.push(new Item(this.x, this.y, itemType));
                    }
                }
                updateHUD();
            }
        }

        class Item {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.width = 24 * scaleFactor;
                this.height = 24 * scaleFactor;
                this.vy = 2 * scaleFactor;

                if (type === 'power') {
                    this.color = COLORS.power;
                    this.text = 'P';
                } else if (type === 'heal') {
                    this.color = COLORS.heal;
                    this.text = 'H';
                } else if (type === 'shield') {
                    this.color = '#00FFFF';
                    this.text = 'S';
                } else if (type === 'drone') {
                    this.color = '#FF00FF';
                    this.text = 'D';
                } else if (type === 'bomb') {
                    this.color = '#FFFFFF';
                    this.text = 'B';
                } else if (type === 'laser') {
                    this.color = '#FF1493'; // DeepPink
                    this.text = 'L';
                }
                this.markedForDeletion = false;
            }

            update(dt) {
                this.y += this.vy;
                if (this.y > GAME_HEIGHT + 50) this.markedForDeletion = true;
            }

            draw(ctx) {
                // 影
                ctx.fillStyle = COLORS.line;
                ctx.fillRect(this.x - this.width / 2 + 4 * scaleFactor, this.y - this.height / 2 + 4 * scaleFactor, this.width, this.height);
                // 本体
                drawRectNeo(ctx, this.x - this.width / 2, this.y - this.height / 2, this.width, this.height, this.color, COLORS.line, 3);
                // テキスト
                ctx.fillStyle = COLORS.line;
                ctx.font = `900 ${14 * scaleFactor}px 'M PLUS Rounded 1c'`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.text, this.x, this.y + 1 * scaleFactor);
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = (Math.random() * 8 + 4) * scaleFactor;
                const angle = Math.random() * Math.PI * 2;
                const speed = (Math.random() * 5 + 2) * scaleFactor;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.05 + 0.02;
                this.shape = Math.random() > 0.5 ? 'rect' : 'triangle';
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                if (this.shape === 'rect') {
                    drawRectNeo(ctx, this.x, this.y, this.size, this.size, this.color, COLORS.line, 1);
                } else {
                    drawTriangleNeo(ctx, this.x, this.y, this.size, this.color, this.life * 10);
                }
                ctx.restore();
            }
        }

        /** --- ユーティリティ --- */
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function checkCollision(obj1, obj2) {
            const dx = obj1.x - obj2.x;
            const dy = obj1.y - obj2.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const r1 = obj1.size || obj1.width / 2;
            const r2 = obj2.size || obj2.width / 2;
            return dist < (r1 + r2) * 0.85;
        }

        function updateHUD() {
            scoreDisplay.innerText = score;
            const stageDisp = document.getElementById('stageDisplay');
            if (stageDisp) stageDisp.innerText = currentStage;

            const hpPercent = Math.max(0, (player.hp / player.maxHp) * 100);
            hpBar.style.width = `${hpPercent}%`;
            if (hpPercent < 30) {
                hpBar.style.backgroundColor = COLORS.accent;
            } else {
                hpBar.style.backgroundColor = COLORS.primary;
            }
        }

        /** --- ゲームループと状態管理 --- */
        function initGame(stage, keepPlayer = false) {
            currentStage = stage;
            if (!keepPlayer || typeof player === 'undefined') {
                player = new Player();
                score = 0;
            } else {
                player.x = GAME_WIDTH / 2;
                player.y = GAME_HEIGHT * 0.8;
                player.isCharging = false;
                player.chargeLevel = 0;
                player.laserModeTimer = 0;
            }

            bullets = [];
            enemies = [];
            particles = [];
            items = [];
            activeBoss = null;
            mobsKilled = 0;

            difficultyLevel = 1 + (stage - 1) * 2;

            frameCount = 0;
            shakeTime = 0;
            hitStopTime = 0;
            hitStopCallback = null;
            warningTimer = 0;
            nextBossType = null;
            stageClearTimer = 0;
            stageStartTimer = 2000;
            isGameClear = false;
            gameClearTimer = 0;

            updateHUD();
        }

        function startGame(stage = 1, keepPlayer = false) {
            initGame(stage, keepPlayer);
            gameState = 'playing';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            pauseModal.classList.add('hidden');
            hud.classList.remove('hidden');
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameState = 'gameover';
            hud.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
            document.getElementById('finalScore').innerText = score;
        }

        function endGameClear() {
            gameState = 'gameclear';
            hud.classList.add('hidden');
            gameClearScreen.classList.remove('hidden');
            clearScore.innerText = score;
            playSound('powerup');
        }

        function spawnEnemies() {
            if (activeBoss || stageClearTimer > 0 || stageStartTimer > 0) return;

            if (warningTimer > 0) return;

            if (mobsKilled >= 20 && bossPhase === 1) { nextBossType = 'small_boss'; warningTimer = 3000; mobsKilled = 0; playSound('siren'); setTimeout(() => playSound('siren'), 1500); return; }
            if (mobsKilled >= 20 && bossPhase === 2) { nextBossType = 'medium_boss'; warningTimer = 3000; mobsKilled = 0; playSound('siren'); setTimeout(() => playSound('siren'), 1500); return; }
            if (mobsKilled >= 20 && bossPhase === 3) { nextBossType = 'large_boss'; warningTimer = 3000; mobsKilled = 0; playSound('siren'); setTimeout(() => playSound('siren'), 1500); return; }

            if (Math.random() < 0.02 + (difficultyLevel * 0.012)) {
                const x = Math.random() * (GAME_WIDTH - 40 * scaleFactor) + 20 * scaleFactor;
                const mobVars = ['mob', 'mob_2', 'mob_3'];
                const selectedMob = mobVars[Math.floor(Math.random() * mobVars.length)];
                enemies.push(new Enemy(x, -20, selectedMob));
            }
        }

        function update(dt) {
            frameCount++;

            if (isGameClear) {
                gameClearTimer -= dt;
                shakeTime = 50; shakeMagnitude = 5;

                if (Math.random() < 0.5) {
                    const colors = ['#FFD700', '#00FFFF', '#FF00FF', '#FF5A5F', '#00E676'];
                    const c = colors[Math.floor(Math.random() * colors.length)];
                    createParticles(GAME_WIDTH * Math.random(), GAME_HEIGHT * Math.random(), c, 40);
                    if (Math.random() < 0.2) playSound(Math.random() > 0.5 ? 'explosion' : 'powerup');
                }

                if (gameClearTimer <= 0) {
                    endGameClear();
                    isGameClear = false;
                    return;
                }
                player.update(dt);
                particles.forEach(p => p.update());
                return;
            }

            if (warningTimer > 0) {
                warningTimer -= dt;
                if (warningTimer <= 0 && nextBossType) {
                    enemies.push(new Enemy(GAME_WIDTH / 2, -50, nextBossType));
                    nextBossType = null;
                }
            }

            if (stageClearTimer > 0) {
                stageClearTimer -= dt;
                shakeTime = 50;
                shakeMagnitude = currentStage * 3;

                if (Math.random() < currentStage * 0.15) {
                    const colors = ['#00FFFF', '#FF00FF', '#00E676'];
                    const c = colors[Math.floor(Math.random() * colors.length)];
                    createParticles(GAME_WIDTH * Math.random(), GAME_HEIGHT * Math.random(), c, 10 + currentStage * 15);
                    if (Math.random() < 0.2) playSound('powerup');
                }

                if (stageClearTimer <= 0) {
                    currentStage++;
                    startGame(currentStage, true);
                }
                player.update(dt);
                bullets.forEach(b => b.update(dt));
                particles.forEach(p => p.update());
                return;
            }

            player.update(dt);
            spawnEnemies();

            bullets.forEach(b => b.update(dt));
            bullets = bullets.filter(b => !b.markedForDeletion);
            enemies.forEach(e => e.update(dt));
            enemies = enemies.filter(e => !e.markedForDeletion);
            items.forEach(i => i.update(dt));
            items = items.filter(i => !i.markedForDeletion);
            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);

            const playerBullets = bullets.filter(b => !b.isEnemy);
            const enemyBullets = bullets.filter(b => b.isEnemy);

            playerBullets.forEach(pBullet => {
                enemyBullets.forEach(eBullet => {
                    if (!pBullet.markedForDeletion && !eBullet.markedForDeletion && checkCollision(pBullet, eBullet)) {
                        eBullet.markedForDeletion = true;
                        if (!pBullet.isCharge) pBullet.markedForDeletion = true;
                        createParticles(eBullet.x, eBullet.y, '#FFFFFF', 3);
                    }
                });
            });

            playerBullets.forEach(bullet => {
                enemies.forEach(enemy => {
                    if (!bullet.markedForDeletion && checkCollision(bullet, enemy)) {
                        if (!bullet.isCharge) bullet.markedForDeletion = true;
                        enemy.takeDamage(bullet.damage || 1);
                    }
                });
            });

            enemyBullets.forEach(bullet => {
                if (!bullet.markedForDeletion && checkCollision(bullet, player)) {
                    bullet.markedForDeletion = true;
                    player.takeDamage(10);
                }
            });

            enemies.forEach(enemy => {
                if (checkCollision(enemy, player)) {
                    enemy.takeDamage(100);
                    player.takeDamage(20);
                }
            });

            items.forEach(item => {
                if (!item.markedForDeletion && checkCollision(item, player)) {
                    item.markedForDeletion = true;
                    playSound('powerup');
                    if (item.type === 'heal') {
                        player.hp = Math.min(player.maxHp, player.hp + 30);
                        createParticles(player.x, player.y, COLORS.heal, 10);
                    } else if (item.type === 'power') {
                        player.powerLevel = Math.min(15, player.powerLevel + 1);
                        score += 500;
                        createParticles(player.x, player.y, COLORS.power, 10);
                    } else if (item.type === 'shield') {
                        player.shieldActive = true;
                        score += 1000;
                        createParticles(player.x, player.y, '#00FFFF', 10);
                    } else if (item.type === 'drone') {
                        player.droneCount = Math.min(4, player.droneCount + 1);
                        score += 1000;
                        createParticles(player.x, player.y, '#FF00FF', 10);
                    } else if (item.type === 'laser') {
                        player.laserModeTimer = 5000;
                        score += 1000;
                        createParticles(player.x, player.y, '#FF1493', 20);
                    } else if (item.type === 'bomb') {
                        playSound('bomb');
                        shakeTime = 500; shakeMagnitude = 20;
                        score += 2000;
                        enemies.forEach(e => {
                            if (e.type.includes('boss')) e.takeDamage(500);
                            else { e.hp = 0; e.takeDamage(100); }
                        });
                        for (let i = 0; i < 30; i++) createParticles(GAME_WIDTH * Math.random(), GAME_HEIGHT * Math.random(), '#FFFFFF', 5);
                    }
                    updateHUD();
                }
            });
        }

        function draw() {
            ctx.resetTransform();
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            ctx.save();
            if (shakeTime > 0) {
                shakeTime -= 16;
                ctx.translate((Math.random() - 0.5) * shakeMagnitude, (Math.random() - 0.5) * shakeMagnitude);
            }

            bgScroll += 1;
            const bgContainer = document.getElementById('game-container');
            bgContainer.style.backgroundPosition = `0px ${bgScroll}px`;

            items.forEach(i => i.draw(ctx));
            enemies.forEach(e => e.draw(ctx));
            bullets.forEach(b => b.draw(ctx));
            particles.forEach(p => p.draw(ctx));
            player.draw(ctx);

            ctx.restore();

            if (warningTimer > 0) {
                if (Math.floor(warningTimer / 200) % 2 === 0) {
                    ctx.fillStyle = 'rgba(255, 90, 95, 0.3)';
                    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                    ctx.fillStyle = COLORS.accent;
                    ctx.font = `900 ${40 * scaleFactor}px 'M PLUS Rounded 1c'`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText("WARNING", GAME_WIDTH / 2, GAME_HEIGHT / 2);
                }
            }

            if (stageClearTimer > 0) {
                if (Math.floor(frameCount / (10 - currentStage * 2)) % 2 === 0) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${0.05 * currentStage})`;
                    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                } else {
                    ctx.fillStyle = 'rgba(11, 47, 82, 0.3)';
                    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                }

                const scale = 1 + Math.sin(frameCount * 0.1) * (0.05 * currentStage);
                const hue = (frameCount * (5 * currentStage)) % 360;

                ctx.save();
                ctx.translate(GAME_WIDTH / 2, GAME_HEIGHT / 2);
                ctx.scale(scale, scale);
                ctx.rotate(Math.sin(frameCount * 0.05) * (0.02 * currentStage));

                ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
                ctx.font = `900 ${40 * scaleFactor}px 'M PLUS Rounded 1c'`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowBlur = 10 * currentStage;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.fillText(`STAGE ${currentStage} CLEAR!!`, 0, 0);
                ctx.restore();
            }

            if (stageStartTimer > 0) {
                stageStartTimer -= 16;
                ctx.fillStyle = 'rgba(11, 47, 82, 0.5)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = COLORS.primary;
                ctx.font = `900 ${60 * scaleFactor}px 'M PLUS Rounded 1c'`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(`STAGE ${currentStage}`, GAME_WIDTH / 2, GAME_HEIGHT / 2 - 20 * scaleFactor);
                ctx.font = `900 ${30 * scaleFactor}px 'M PLUS Rounded 1c'`;
                ctx.fillText(`START`, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 40 * scaleFactor);
            }

            if (isGameClear) {
                if (Math.floor(frameCount / 5) % 2 === 0) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                }

                const scale = 1 + Math.sin(frameCount * 0.1) * 0.15;
                const hue = (frameCount * 15) % 360;
                ctx.save();
                ctx.translate(GAME_WIDTH / 2, GAME_HEIGHT / 2);
                ctx.scale(scale, scale);
                ctx.rotate(Math.sin(frameCount * 0.05) * 0.05);

                ctx.font = `900 ${40 * scaleFactor}px 'M PLUS Rounded 1c'`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.fillText("MISSION ACCOMPLISHED!!", 0, 0);
                ctx.restore();
            }
        }

        function gameLoop(timestamp) {
            if (gameState !== 'playing') return;

            const dt = timestamp - lastTime;
            lastTime = timestamp;

            if (dt < 100) {
                if (hitStopTime > 0) {
                    hitStopTime -= dt;
                    if (hitStopTime <= 0 && hitStopCallback) {
                        hitStopCallback();
                        hitStopCallback = null;
                    }
                } else {
                    update(dt);
                }
            }
            draw();

            requestAnimationFrame(gameLoop);
        }

        /** --- イベントリスナーの登録 --- */
        stageBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const stage = parseInt(e.target.dataset.stage);
                startGame(stage);
            });
        });

        retryBtn.addEventListener('click', () => startGame(currentStage));

        homeBtnClear.addEventListener('click', () => {
            location.reload();
        });

        pauseBtn.addEventListener('click', () => {
            if (gameState === 'playing') {
                gameState = 'paused';
                pauseModal.classList.remove('hidden');
            }
        });

        resumeBtn.addEventListener('click', () => {
            if (gameState === 'paused') {
                gameState = 'playing';
                pauseModal.classList.add('hidden');
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
            }
        });

        goHomeBtn.addEventListener('click', () => {
            gameState = 'start';
            pauseModal.classList.add('hidden');
            hud.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        });

        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

    </script>
</body>
